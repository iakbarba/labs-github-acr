name: Build and push the image

on:
  push:
      branches:
        - 'main'

env:
  IMAGE_REPOSITORY_NAME: brezyweather
  IMAGE_TAG: 1.0.0

jobs:
  build:
    name: Build BrezyWeather container image
    runs-on: ubuntu-latest

    steps:
      - name: set up Docker Buildx
        uses: docker/login-action@v1
        with:
          registry: ${{ secrets.AKR_SERVER }}
          username: ${{ secrets.AKR_USERNAME }}
          password: ${{ secrets.AKR_PASSWORD }}
      - name: Build & push the image
        uses: docker/build-push-action@v2
        with:
          push: true
          tags: ${{ secrets.AKR_SERVERNAME }}/${{ env.IMAGE_REPOSITORY_NAME }}.${{ env.IMAGE_TAG }}
        
